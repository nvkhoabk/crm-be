version: '2'

services:
  crm_db:
    container_name: 'crm_db'
    image: mysql:5.7
    ports:
      - '3306:3306'
    environment:
       MYSQL_DATABASE: 'crm_db'
       MYSQL_PASSWORD: 'root'
       MYSQL_ROOT_PASSWORD: 'root'
    command: ['mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci']
  crm_db_redis:
    container_name: 'crm_db_redis'
    image: 'redis:3.2.0'
    ports:
      - '6379:6379'
  web:
    build: .
    command: python3 manage.py runserver 0.0.0.0:8001 
    volumes:
      - '.:/src'
    ports:
      - "8001:8001"
    depends_on:
      - crm_db
      - crm_db_redis